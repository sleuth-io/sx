"""GraphQL type for skill."""
type Skill implements VaultAsset {
  slug: String!
  description: String!
  id: ID!
  name: String!
  type: AssetType!
  latestVersion: String!
  versionsCount: Int!
  status: SkillStatusEnum!
  installations: [VaultAssetInstallation!]!

  """
  Pending installation requests for this asset visible to the current user
  """
  installationRequests: [AssetInstallationRequest!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  versions: [VaultAssetVersion!]!
  profiles: [VaultAssetProfile!]!
  isChatDefault: Boolean!
  usageCount: Int!

  """Token counts for the current version"""
  tokenCounts: AssetTokenCount

  """Asset source metadata"""
  source: AssetSource!

  """Current user's permissions for this asset"""
  permissions: VaultAssetPermissions

  """Files belonging to this asset"""
  files(
    """Get files at a specific asset version number"""
    version: Int
  ): [SkillFile!]!

  """Repository code contexts where this asset will execute"""
  codeContexts: [AssetCodeContext!]!

  """Whether an evaluation is currently in progress for this asset"""
  evaluating: Boolean!

  """
  Last known context tokens used in orchestration for progress bar display
  """
  contextTokensUsed: Int

  """Maximum context tokens available for orchestration"""
  contextMaxTokens: Int
  teamId: String
  teamName: String

  """GID of the repository this skill was imported from"""
  sourceRepositoryGid: String

  """Name of the repository this skill was imported from"""
  sourceRepositoryName: String

  """All evals for this skill"""
  evals: [AssetEval!]

  """Pass rate from latest benchmark (with_skill)"""
  evalPassRate: Float

  """Delta pass rate from latest benchmark (with_skill - without_skill)"""
  evalImpact: Float

  """Most recent benchmark with full results"""
  latestBenchmark: EvalBenchmark

  """Benchmark history (lightweight summaries)"""
  benchmarks: [EvalBenchmarkSummary!]

  """Description optimization history"""
  descriptionOptimizations: [DescriptionOptimization!]
}

