query VaultAssets($first: Int, $after: String, $assetType: AssetType!, $search: String) {
  vault {
    assets(first: $first, after: $after, type: $assetType, search: $search) {
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        slug
        type
        latestVersion
        versionsCount
        description
        createdAt
        updatedAt
      }
    }
  }
}
