query AssetInstallations($first: Int, $after: String) {
  vault {
    assets(first: $first, after: $after) {
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        slug
        name
        installations {
          entityType
          entityName
          entityRef
          entityId
          monoRepoConfigId
          viaCollectionId
        }
      }
    }
  }
}
