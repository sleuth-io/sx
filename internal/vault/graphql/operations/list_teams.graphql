query ListTeams($first: Int!, $term: String, $memberFirst: Int!) {
  organization {
    teams(first: $first, term: $term, parent: {any: true}) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        name
        adminMembers{
          id
          email
        }
        members(first: $memberFirst) {
          totalCount
          nodes {
            id
            email
          }
        }
        skillsRepositories {
          repositoryId
          owner
          name
        }
      }
    }
  }
}
