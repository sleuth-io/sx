query VaultAssetLookup($slug: String, $search: String, $first: Int) {
  vault {
    assets(slug: $slug, search: $search, first: $first) {
      nodes {
        slug
        name
        type
        description
        createdAt
        updatedAt
        versions {
          version
          createdAt
          filesCount
        }
      }
    }
  }
}
