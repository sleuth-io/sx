name: Desktop App Release

# Builds the desktop app for macOS, Windows, and Linux on the same tags that
# release the CLI, and uploads the installers to that GitHub release.
#
# macOS ships a DMG (first install) plus a zip (the app's auto-update
# feed). When the signing secrets exist, both are Developer ID-signed,
# notarized, and stapled and the "-unsigned" name suffix is dropped; see
# docs/macos-signing.md for the secrets to add once the Apple Developer
# enrollment lands. Windows artifacts remain unsigned until an
# Authenticode cert is provisioned.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to build for and attach to (e.g. v2.0.0); artifacts are clobber-uploaded"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS `artifact` is a name PREFIX (the packaging script decides
          # the -unsigned suffix at runtime and emits both a zip and a
          # DMG); the other platforms use exact file names. Upload steps
          # glob `artifact*` so both conventions work.
          #
          # Linux/Windows names carry a "-portable" qualifier so they do NOT
          # end in "<os>-<arch>.<ext>". The CLI's self-updater (go-selfupdate)
          # selects a release asset by that trailing suffix; without the
          # qualifier a name like "sx-app-linux-amd64.tar.gz" matches the same
          # pattern as the CLI's own "sx_Linux_x86_64.tar.gz" and, being first
          # alphabetically, gets picked — then the update fails because the app
          # tar has no "sx" binary. macOS uses "macos" (not "darwin"), so its
          # names never collide and keep the prefix the app updater expects
          # (sx-app-macos-<arch>, see app/update.go).
          - name: macos-arm64
            os: macos-latest
            platform: darwin/arm64
            arch: arm64
            artifact: sx-app-macos-arm64
          - name: macos-amd64
            os: macos-13
            platform: darwin/amd64
            arch: amd64
            artifact: sx-app-macos-amd64
          - name: windows-amd64
            os: windows-latest
            platform: windows/amd64
            artifact: sx-app-windows-amd64-portable.zip
          - name: windows-arm64
            os: windows-11-arm
            platform: windows/arm64
            artifact: sx-app-windows-arm64-portable.zip
          - name: linux-amd64
            os: ubuntu-latest
            platform: linux/amd64
            artifact: sx-app-linux-amd64-portable.tar.gz
          - name: linux-arm64
            os: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: sx-app-linux-arm64-portable.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # On a backfill dispatch, build the RELEASE TAG's source — only
          # the workflow file (this file, from the dispatching branch)
          # differs. Artifacts attached to a release are always built from
          # exactly the commit the tag points at.
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build app
        working-directory: app
        # bash everywhere: the ${TAG#v} suffix strip is bash syntax —
        # under the Windows runners' default PowerShell it expands to ""
        # and Windows builds would self-identify as dev builds (disabling
        # updates entirely).
        shell: bash
        run: |
          TAG="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          EXTRA=""
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Ubuntu 24.04 runners ship webkit2gtk 4.1 only; without this
            # build tag wails pkg-configs the absent webkit2gtk-4.0 and the
            # compile fails (the deps step installs libwebkit2gtk-4.1-dev).
            EXTRA="-tags webkit2_41"
          fi
          wails build -platform ${{ matrix.platform }} $EXTRA \
            -ldflags "-X github.com/sleuth-io/sx/internal/buildinfo.Version=${TAG#v}"
        env:
          CGO_ENABLED: 1
          RELEASE_TAG: ${{ inputs.release_tag }}

      # Sign + notarize + staple when the secrets exist (Developer ID),
      # ad-hoc sign with a clear -unsigned suffix when they don't — so
      # forks and pre-enrollment builds keep working.
      - name: Package (macOS)
        if: runner.os == 'macOS'
        env:
          ARCH: ${{ matrix.arch }}
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
        run: bash .github/scripts/package-macos.sh

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: app/build/bin
        run: Compress-Archive -Path * -DestinationPath ${{ matrix.artifact }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: app/build/bin
        run: tar -czf ${{ matrix.artifact }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          # Exact name on Windows/Linux; prefix glob on macOS (zip + dmg,
          # suffix decided at package time).
          path: app/build/bin/${{ matrix.artifact }}*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        # The GoReleaser workflow creates the release after its test job;
        # poll for it rather than racing (a missing release here would drop
        # this platform's artifact). On dispatch, RELEASE_TAG targets an
        # existing release instead (backfilling failed platforms).
        run: |
          TAG="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          for i in $(seq 1 60); do
            if gh release view "$TAG" > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for release $TAG to exist ($i)..."
            sleep 30
          done
          gh release upload "$TAG" app/build/bin/${{ matrix.artifact }}* --clobber
